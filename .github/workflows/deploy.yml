# Deployment triggered by Antigravity on 2026-04-28 - Port fix
name: Deploy to Azure VM


on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_AI_ENGINE: ${{ github.repository }}/ai-engine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository name
        run: |
          echo "REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}/frontend

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}/backend

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract metadata (tags, labels) for AI Engine
        id: meta-ai-engine
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}/ai-engine

      - name: Build and push AI Engine image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_engine
          push: true
          tags: ${{ steps.meta-ai-engine.outputs.tags }}
          labels: ${{ steps.meta-ai-engine.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/SmartTrade
            set -e
            show_deploy_debug() {
              docker compose -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.prod.yml logs --tail=120 || true
            }
            trap show_deploy_debug ERR

            REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
            # Update the production compose file
            cat <<EOF > docker-compose.prod.yml
            version: "3.9"
            services:
              frontend:
                image: ${{ env.REGISTRY }}/$REPO_LC/frontend:main
                container_name: smarttrade-frontend
                ports:
                  - "3000:3000"
                restart: unless-stopped
                environment:
                  - NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
                  - BACKEND_URL=http://backend:10000
                depends_on:
                  - backend

              backend:
                image: ${{ env.REGISTRY }}/$REPO_LC/backend:main
                container_name: smarttrade-backend
                ports:
                  - "8000:10000"
                restart: unless-stopped
                environment:
                  - REDIS_URL=redis://redis:6379/0
                  - TWELVEDATA_API_KEY=${{ secrets.TWELVEDATA_API_KEY }}
                  - AI_ENGINE_URL=http://ai-engine:8010
                  - CORE_ENGINE_USE_AI=true
                  - AI_ENGINE_TIMEOUT_SECONDS=25
                depends_on:
                  - redis

              ai-engine:
                image: ${{ env.REGISTRY }}/$REPO_LC/ai-engine:main
                container_name: smarttrade-ai-engine
                ports:
                  - "8010:8010"
                restart: unless-stopped
                environment:
                  - PORT=8010
                  - BACKEND_MARKET_DATA_URL=http://backend:10000
                  - AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
                  - AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
                  - AZURE_OPENAI_MODEL=gpt-5.3-codex
                  - AZURE_OPENAI_API_VERSION=2025-04-01-preview
                  - NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}
                  - AI_ENGINE_REQUEST_TIMEOUT_SECONDS=20
                  - AI_ENGINE_CANDLE_LIMIT=300
                  - AI_ENGINE_NEWS_RESULTS_LIMIT=5
                  - AI_ENGINE_SEARCH_RESULTS_LIMIT=4
                  - AI_ENGINE_NEWS_LOOKBACK_DAYS=2
                depends_on:
                  - backend

              redis:
                image: redis:7-alpine
                container_name: smarttrade-redis
                command: ["redis-server", "--appendonly", "yes"]
                volumes:
                  - redis-data:/data
                ports:
                  - "6379:6379"
                restart: unless-stopped

            volumes:
              redis-data:
            EOF

            # Login to GHCR on the VM
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Verify services from inside the VM before reporting success.
            for endpoint in \
              http://127.0.0.1:3000 \
              http://127.0.0.1:8000/health \
              http://127.0.0.1:8010/health; do
              echo "Checking $endpoint"
              for attempt in $(seq 1 12); do
                if curl -fsS -o /tmp/deploy-health-check "$endpoint"; then
                  head -c 300 /tmp/deploy-health-check
                  echo
                  break
                fi
                if [ "$attempt" = "12" ]; then
                  echo "Health check failed for $endpoint"
                  exit 1
                fi
                sleep 5
              done
            done

            echo "Checking AI Engine analysis endpoint"
            curl -fsS http://127.0.0.1:8010/analyze/BTCUSDT/15m > /tmp/ai-analysis.json
            python3 - <<'PY'
            import json
            from pathlib import Path

            payload = json.loads(Path("/tmp/ai-analysis.json").read_text())
            print(json.dumps({
                "analysisSource": payload.get("analysisSource"),
                "aiPowered": payload.get("aiPowered"),
                "model": payload.get("model"),
                "direction": (payload.get("prediction") or {}).get("direction"),
                "confidence": payload.get("confidence"),
            }))
            if payload.get("analysisSource") != "ai-engine" or payload.get("aiPowered") is not True:
                raise SystemExit("AI engine analyze endpoint did not return an Azure-powered analysis")
            PY

            echo "Checking Core Engine signal endpoint"
            curl -fsS http://127.0.0.1:8000/signals/BTCUSDT/15m > /tmp/backend-signal.json
            python3 - <<'PY'
            import json
            from pathlib import Path

            payload = json.loads(Path("/tmp/backend-signal.json").read_text())
            print(json.dumps({
                "analysisSource": payload.get("analysisSource"),
                "aiPowered": payload.get("aiPowered"),
                "model": payload.get("model"),
                "direction": (payload.get("prediction") or {}).get("direction"),
                "confidence": payload.get("confidence"),
            }))
            if payload.get("analysisSource") != "ai-engine":
                raise SystemExit("Backend signal endpoint did not return the AI engine response")
            PY
            
            # Cleanup old images
            docker image prune -af
