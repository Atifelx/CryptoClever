version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    container_name: smarttrade-frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarttrade-backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Add any Binance proxy / DB URLs here or via .env
      # - HTTP_PROXY=
      # - HTTPS_PROXY=
      - MASSIVE_API_KEY=${MASSIVE_API_KEY}
    depends_on:
      - redis
    ports:
      - "8000:10000" # container uses PORT=10000, exposed externally as 8000
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smarttrade-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  redis-data:

